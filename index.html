<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control Café OXXO</title>

<style>

body{
font-family:Arial, sans-serif;
background:#eef2f7;
margin:0;
padding:15px;
color:#333;
}

h1{
text-align:center;
margin-bottom:25px;
font-size:24px;
}

.container{
max-width:900px;
margin:auto;
}

.categoria{
background:white;
border-radius:12px;
margin-bottom:20px;
padding:16px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
border-left:6px solid #6b8cff;
}

.categoria h2{
margin:0 0 12px 0;
font-size:18px;
}

.header{
display:grid;
grid-template-columns:2fr 110px 110px 120px;
font-weight:bold;
margin-bottom:8px;
font-size:13px;
color:#667;
text-align:center;
}

.header div:first-child{
text-align:left;
}

.producto{
display:grid;
grid-template-columns:2fr 110px 110px 120px;
gap:8px;
align-items:center;
padding:8px 0;
border-bottom:1px solid #f0f0f0;
}

.producto:last-child{
border-bottom:none;
}

.nombre{
font-weight:bold;
cursor:pointer;
}

.oz{
font-size:11px;
color:#777;
}

input{
width:100%;
padding:7px;
font-size:16px;
text-align:center;
border:1px solid #ddd;
border-radius:6px;
background:#fafafa;
}

.total{
font-weight:bold;
text-align:center;
color:#1a237e;
}

.detalle{
font-size:11px;
color:#666;
text-align:center;
}

.warning{
background:#ffebee;
border-color:#e53935;
}

.controls{
text-align:center;
margin-top:25px;
}

button{
padding:12px 25px;
font-size:15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#e53935;
color:white;
}

/* TARJETA PRODUCTO */

.product-card{
position:fixed;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:260px;
background:white;
border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
padding:15px;
display:none;
z-index:1000;
}

.product-card img{
width:100%;
border-radius:8px;
margin-bottom:10px;
}

.overlay{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
display:none;
z-index:999;
}

@media (max-width:600px){

.header{
display:none;
}

.producto{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<h1>☕ Control Café OXXO</h1>

<div class="container" id="app"></div>

<div class="controls">
<button onclick="limpiarTodo()">Limpiar Inventario</button>
</div>

<div class="overlay" id="overlay"></div>

<div class="product-card" id="productCard">
<img id="cardImg">
<h3 id="cardTitle"></h3>
<p id="cardInfo"></p>
</div>

<script>

const productos=[

{
categoria:"Sabores de Café",
items:[

{nombre:"Regular",oz:700,img:"imagenes/regular.png",info:"Sabor clásico de café."},
{nombre:"Canela",oz:700,img:"imagenes/canela.jpg",info:"Café sabor canela."},
{nombre:"Crema Irlandesa",oz:700,img:"imagenes/irlandesa.jpg",info:"Café sabor crema irlandesa."},
{nombre:"Moka",oz:700,img:"imagenes/moka.jpg",info:"Café sabor chocolate moka."},
{nombre:"Chocolate",oz:700,img:"imagenes/chocolate.jpg",info:"Bebida sabor chocolate."},
{nombre:"Chocolate Abuelita",oz:647,img:"imagenes/abuelita.jpg",info:"Chocolate Abuelita."},
{nombre:"Avellana",oz:700,img:"imagenes/avellana.jpg",info:"Café sabor avellana."},
{nombre:"Sin Azúcar",oz:700,img:"imagenes/sinazucar.jpg",info:"Café sin azúcar."},
{nombre:"Vainilla",oz:700,img:"imagenes/vainilla.jpg",info:"Café sabor vainilla."},
{nombre:"Moka Blanco",oz:700,img:"imagenes/mokablanco.jpg",info:"Café moka blanco."}

]
},

{
categoria:"Máquina Gourmet",
items:[

{nombre:"Base Leche",oz:1250,limite:1250,img:"imagenes/leche.jpg",info:"Base leche máquina gourmet."},
{nombre:"Base Vainilla",oz:1250,limite:1250,img:"imagenes/basevainilla.jpg",info:"Base vainilla máquina gourmet."},
{nombre:"Hershey",oz:647,img:"imagenes/hershey.jpg",info:"Chocolate Hershey."}

]
},

{
categoria:"Café Grano Andatti",
items:[

{nombre:"Café Grano Gourmet",oz:1000,img:"imagenes/granogourmet.jpg",info:"Café grano gourmet."},
{nombre:"Café Grano Andatti",oz:1000,img:"imagenes/granoandatti.jpg",info:"Café grano Andatti."}

]
}

];

const app=document.getElementById("app");

productos.forEach(cat=>{

let div=document.createElement("div");
div.className="categoria";

div.innerHTML=`

<h2>${cat.categoria}</h2>

<div class="header">
<div>Producto</div>
<div>Bolsas</div>
<div>Contenedor</div>
<div>Total</div>
</div>

`;

cat.items.forEach(p=>{

let row=document.createElement("div");
row.className="producto";

row.dataset.oz=p.oz;
row.dataset.limite=p.limite||"";

row.innerHTML=`

<div class="nombre" onclick="mostrarProducto('${p.nombre}','${p.img}','${p.info}',${p.oz})">

${p.nombre}
<div class="oz">${p.oz} oz por bolsa</div>

</div>

<input type="number" class="bolsas" value="0" min="0">

<input type="number" class="contenedor" value="0" min="0">

<div class="total"></div>

`;

div.appendChild(row);

});

app.appendChild(div);

});

document.querySelectorAll("input").forEach(i=>{

i.addEventListener("input",calcular);

});

function calcular(){

document.querySelectorAll(".producto").forEach(row=>{

let oz=parseFloat(row.dataset.oz);

let bolsas=parseFloat(row.querySelector(".bolsas").value)||0;

let contenedorInput=row.querySelector(".contenedor");

let contenedor=parseFloat(contenedorInput.value)||0;

let limite=parseFloat(row.dataset.limite);

if(limite && contenedor>limite){

contenedorInput.classList.add("warning");

}else{

contenedorInput.classList.remove("warning");

}

let ozBolsas=oz*bolsas;

let total=ozBolsas+contenedor;

row.querySelector(".total").innerHTML=
`${total} oz
<div class="detalle">${ozBolsas} + ${contenedor}</div>`;

});

}

function limpiarTodo(){

if(!confirm("¿Seguro que quieres borrar todo?")) return;

document.querySelectorAll(".bolsas").forEach(i=>i.value=0);
document.querySelectorAll(".contenedor").forEach(i=>i.value=0);

calcular();

}

function mostrarProducto(nombre,img,info,oz){

document.getElementById("cardTitle").innerText=nombre;
document.getElementById("cardImg").src=img;
document.getElementById("cardInfo").innerText=info+" | Bolsa: "+oz+" oz";

document.getElementById("overlay").style.display="block";
document.getElementById("productCard").style.display="block";

}

document.getElementById("overlay").onclick=function(){

this.style.display="none";
document.getElementById("productCard").style.display="none";

}

calcular();

</script>

</body>
</html>
